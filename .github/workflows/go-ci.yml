name: Go CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: go mod tidy check
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod or go.sum is out of date — run 'go mod tidy' locally"
            exit 1
          fi

      - name: embed-sync drift check
        run: |
          make embed-sync
          if ! git diff --exit-code -- internal/roles/embedded/; then
            echo "::error::internal/roles/embedded/ is out of sync with /scripts — run 'make embed-sync' locally"
            exit 1
          fi

      - name: build
        run: go build -trimpath ./...

      - name: test
        run: go test -race -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install golangci-lint from source
        # The prebuilt golangci-lint binaries are compiled with an older
        # Go than our 1.25 module floor, so they refuse to load go.mod.
        # Installing via `go install` uses the runner's Go and avoids
        # that mismatch.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m ./...

  snapshot:
    name: goreleaser snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean --skip=publish
