name: TODOs sync

# Regenerate TODOS.md whenever issues change (and once a day, as a safety net).
# Posts the diff as an auto-merging PR rather than pushing directly to main —
# that way branch protection stays clean (no actor needs to bypass it) and the
# update goes through the same status checks as any human contribution.
on:
  issues:
    types: [opened, closed, reopened, edited, labeled, unlabeled, milestoned, demilestoned]
  schedule:
    # 13:00 UTC daily
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write       # branch push + (later) PR creation
  pull-requests: write  # opening/updating the sync PR
  issues: read

concurrency:
  group: todos-sync
  # Cancel any in-flight run when a new event lands. TODOS.md regen is
  # idempotent (we re-read live issue state from `gh` each run), so the
  # latest event has the most recent state and earlier runs are obsolete.
  # Without this, a burst of issue events (e.g. filing a Phase batch) races
  # multiple runs on the chore/todos-sync branch and trips
  # --force-with-lease's stale-info check.
  cancel-in-progress: true

jobs:
  sync:
    name: regenerate TODOS.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq (gh is preinstalled)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Regenerate TODOS.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: ./scripts/gen-todos.sh

      - name: Open or update sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          if git diff --quiet -- TODOS.md; then
            echo "TODOS.md unchanged — nothing to PR."
            exit 0
          fi

          BRANCH="chore/todos-sync"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Reset to main + replay just TODOS.md so the branch never carries
          # stale prior-sync commits.
          git fetch origin main
          git switch -C "$BRANCH" origin/main
          ./scripts/gen-todos.sh
          if git diff --quiet -- TODOS.md; then
            echo "On a fresh main, TODOS.md matches — nothing to PR."
            exit 0
          fi
          git add TODOS.md
          git commit -m "chore(todos): sync TODOS.md from GitHub Issues"
          git push --force-with-lease origin "$BRANCH"

          # Reuse an existing PR if one is open; else open a new one and
          # queue it for auto-merge.
          PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR" ]; then
            PR=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(todos): sync TODOS.md from GitHub Issues" \
              --body  "Auto-generated from the latest set of phase-labelled issues. Will merge once status checks are green." \
              --label "area/docs" \
              | tail -1 | sed 's|.*/||')
            gh pr merge "$PR" --auto --squash --delete-branch
          else
            echo "Updated PR #$PR with latest TODOS.md (auto-merge already queued)."
          fi
