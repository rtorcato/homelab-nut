# goreleaser configuration — see https://goreleaser.com
#
# Phase 1: produces snapshot binaries for Linux+macOS amd64+arm64.
# Real releases (deb/rpm/Homebrew tap) land in Phase 4.

version: 2

project_name: homelab-nut

before:
  hooks:
    - go mod download

builds:
  - id: homelab-nut
    main: ./cmd/homelab-nut
    binary: homelab-nut
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: homelab-nut
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      - CONTRIBUTING.md
      - ROADMAP.md
      - docs/**/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^ci:'
      - '^test:'
