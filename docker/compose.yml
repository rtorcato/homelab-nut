# NUT Docker Stack (Path A)
# - nut-exporter: publishes Prometheus metrics for a remote Prometheus to scrape
# - nut-webgui:   browser UI for the UPS
#
# The UPS itself is managed by the bare-metal nut-server on the Docker host
# (see scripts/setup-server.sh). This compose file does NOT run nut-server.
# Prometheus and Grafana are intentionally not included — host them elsewhere
# and point them at this host's nut-exporter on NUT_EXPORTER_PORT.
#
# Copy .env.example to .env and configure before starting.
name: nut-stack
services:
  # Prometheus exporter — scrapes the bare-metal NUT server on the host
  # and publishes metrics on NUT_EXPORTER_PORT for remote Prometheus to scrape.
  nut-exporter:
    image: druggeri/nut_exporter:latest
    container_name: nut-exporter
    restart: unless-stopped
    ports:
      - "${NUT_EXPORTER_PORT:-9199}:9199"
    command:
      - "--nut.server=${NUT_HOST:-host.docker.internal}"
    extra_hosts:
      # Map host.docker.internal to the Docker host gateway on Linux
      - "host.docker.internal:host-gateway"

  # Web UI for the bare-metal NUT server(s) — supports multiple upstream upsd
  # instances via a TOML config file (env-var config is single-server only).
  # https://github.com/SuperioOne/nut_webgui
  # Copy nut-webgui.toml.example to nut-webgui.toml and edit addresses/creds.
  nut-webgui:
    image: ghcr.io/superioone/nut_webgui:latest
    container_name: nut-webgui
    restart: unless-stopped
    ports:
      - "${NUT_WEBGUI_PORT:-9000}:9000"
    environment:
      - NUTWG__CONFIG_FILE=/etc/nut_webgui/config.toml
    volumes:
      - ./nut-webgui.toml:/etc/nut_webgui/config.toml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: nut-network
