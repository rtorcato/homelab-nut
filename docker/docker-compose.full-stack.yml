# NUT Monitoring Stack (Path A)
# Connects to an EXTERNAL NUT server (e.g. bare-metal nut-server on the host).
# Includes: NUT Prometheus exporter, Prometheus, Grafana.
#
# Copy .env.example to .env and configure before starting.
# Set NUT_HOST in .env (default: host.docker.internal -> the Docker host).
name: nut-stack
services:
  # Prometheus Exporter — scrapes the bare-metal NUT server on the host
  nut-exporter:
    image: druggeri/nut_exporter:latest
    container_name: nut-exporter
    restart: unless-stopped
    expose:
      - "9199"
    command:
      - "--nut.server=${NUT_HOST:-host.docker.internal}"
    extra_hosts:
      # Map host.docker.internal to the Docker host gateway on Linux
      - "host.docker.internal:host-gateway"

  # Web UI for the bare-metal NUT server (replaces deprecated webnut).
  # https://github.com/SuperioOne/nut_webgui
  nut-webgui:
    image: ghcr.io/superioone/nut_webgui:latest
    container_name: nut-webgui
    restart: unless-stopped
    ports:
      - "${NUT_WEBGUI_PORT:-9000}:9000"
    environment:
      - UPSD_ADDR=${NUT_HOST:-host.docker.internal}
      - UPSD_USER=${NUT_API_USER:-upsmon}
      - UPSD_PASS=${NUT_API_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      - nut-exporter

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: nut-monitoring
