# NUT Minimal Stack (Path A)
# Publishes the NUT Prometheus exporter so a remote Prometheus/Grafana
# can scrape UPS metrics from this host.
#
# The UPS itself is managed by the bare-metal nut-server on the Docker host
# (see scripts/setup-server.sh). This compose file does NOT run nut-server.
#
# Copy .env.example to .env and configure before starting.
name: nut-stack
services:
  # Prometheus exporter — scrapes the bare-metal NUT server on the host
  # and publishes metrics on NUT_EXPORTER_PORT for remote Prometheus to scrape.
  nut-exporter:
    image: druggeri/nut_exporter:latest
    container_name: nut-exporter
    restart: unless-stopped
    ports:
      - "${NUT_EXPORTER_PORT:-9199}:9199"
    command:
      - "--nut.server=${NUT_HOST:-host.docker.internal}"
    extra_hosts:
      # Map host.docker.internal to the Docker host gateway on Linux
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: nut-network
