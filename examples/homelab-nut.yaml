# homelab-nut inventory — example.
#
# Copy this to ./homelab-nut.yaml at the root of your working directory,
# then run `homelab-nut inventory validate` to check it. Once `homelab-nut
# init` lands (#11), it will generate this file interactively.
#
# Three hosts here cover all five roles:
#   pi-rack       — the Pi attached to the UPS; runs nut-server, the
#                   Prometheus exporter, and the battery-shutdown daemon
#   workstation   — a Linux host monitoring the UPS over the network
#                   and accepting a graceful shutdown when battery is low
#   dream-machine — a UniFi appliance that can't host ~/shutdown.sh, so
#                   it gets an inline `poweroff` command instead

hosts:
  - name: pi-rack
    address: 192.0.2.10
    user: pi
    roles:
      - nut-server
      - exporter
      - shutdown-daemon
    ups:
      name: myups
      driver: usbhid-ups
    # Battery-watch tuning for this host's daemon. Per-host, because each
    # shutdown-daemon host watches its own UPS. Omit to inherit the fleet-wide
    # `shutdown_daemon:` default below (or the built-in 50% / 30s).
    shutdown_daemon:
      threshold: 50
      poll_interval: 30
      # Set SLACK_WEBHOOK in the daemon's environment to enable notifications.
      slack_webhook_env: SLACK_WEBHOOK

  - name: workstation
    address: 192.0.2.20
    user: admin
    roles:
      - nut-client
      - shutdown-target
    shutdown:
      command: ~/shutdown.sh

  - name: dream-machine
    address: 192.0.2.1
    user: admin
    roles:
      - shutdown-target
    shutdown:
      command: poweroff

# Optional fleet-wide default for any shutdown-daemon host that doesn't set
# its own `shutdown_daemon:` block above. A per-host block always wins.
shutdown_daemon:
  threshold: 50
  poll_interval: 30
  slack_webhook_env: SLACK_WEBHOOK
